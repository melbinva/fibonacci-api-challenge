name: CD Template

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Uses GitHub OIDC federation with Microsoft Entra ID (no client secret).
      - name: Azure login (OIDC federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:latest
            ${{ vars.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}

  approval-gate:
    needs: build-and-push
    runs-on:
      - self-hosted
      - linux
    environment: ${{ vars.DEPLOYMENT_ENVIRONMENT }}

    steps:
      - name: Await environment approval
        run: echo "Deployment approved for environment: ${{ vars.DEPLOYMENT_ENVIRONMENT }}"

  deploy-aks:
    needs: [build-and-push, approval-gate]
    runs-on:
      - self-hosted
      - linux

    steps:
      # Uses GitHub OIDC federation with Microsoft Entra ID (no client secret).
      - name: Azure login (OIDC federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # AKS uses managed identity for ACR pull via --attach-acr on the cluster.
      - name: Ensure AKS is attached to ACR
        run: az aks update --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" --name "${{ vars.AKS_CLUSTER_NAME }}" --attach-acr "${{ vars.ACR_NAME }}"

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Render manifest templates
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
          USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID }}
          KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
          AKV_TLS_CERT_SECRET_NAME: ${{ vars.AKV_TLS_CERT_SECRET_NAME }}
          AKV_TLS_KEY_SECRET_NAME: ${{ vars.AKV_TLS_KEY_SECRET_NAME }}
        run: |
          rm -rf rendered-k8s
          cp -R k8s rendered-k8s
          python - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "${AZURE_TENANT_ID}": os.environ["AZURE_TENANT_ID"],
              "${REGISTRY_HOST}": os.environ["REGISTRY_HOST"],
              "${IMAGE_NAME}": os.environ["IMAGE_NAME"],
              "${INGRESS_HOST}": os.environ["INGRESS_HOST"],
              "${USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID}": os.environ["USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID"],
              "${KEY_VAULT_NAME}": os.environ["KEY_VAULT_NAME"],
              "${AKV_TLS_CERT_SECRET_NAME}": os.environ["AKV_TLS_CERT_SECRET_NAME"],
              "${AKV_TLS_KEY_SECRET_NAME}": os.environ["AKV_TLS_KEY_SECRET_NAME"],
          }

          for path in Path("rendered-k8s").rglob("*.yaml"):
              content = path.read_text()
              for old, new in replacements.items():
                  content = content.replace(old, new)
              path.write_text(content)
          PY

      - name: Deploy manifests and update image
        run: |
          kubectl apply -k rendered-k8s
          kubectl -n "${{ vars.AKS_NAMESPACE }}" set image deployment/${{ vars.AKS_DEPLOYMENT_NAME }} \
            ${{ vars.AKS_CONTAINER_NAME }}=${{ vars.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n "${{ vars.AKS_NAMESPACE }}" rollout status deployment/${{ vars.AKS_DEPLOYMENT_NAME }}

      - name: Post-deployment validation (cluster resources)
        run: |
          kubectl -n "${{ vars.AKS_NAMESPACE }}" get deployment/${{ vars.AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.AKS_NAMESPACE }}" get pods -l app=${{ vars.AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.AKS_NAMESPACE }}" get svc,ingress

      - name: Post-deployment validation (HTTP health)
        if: ${{ vars.AKS_VALIDATION_URL != '' }}
        run: |
          curl --fail --show-error --silent "${{ vars.AKS_VALIDATION_URL }}"
