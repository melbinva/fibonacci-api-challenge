name: CD Template

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on:
      - self-hosted
      - linux
    environment: ${{ vars.DEV_DEPLOYMENT_ENVIRONMENT }}

    steps:
      # Prerequisite: the same GitHub OIDC federated identity must also have
      # permission to read/update the AKS cluster resources used below.
      - name: Azure login (OIDC federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # CI is the source of truth for image push into non-production ACR.
      # CD expects NONPROD_REGISTRY_HOST/IMAGE_NAME:${{ github.sha }} to exist.

      # Dev and test pull from non-production ACR via AKS managed identity.
      - name: Ensure dev AKS is attached to non-production ACR
        run: az aks update --resource-group "${{ vars.DEV_AKS_RESOURCE_GROUP }}" --name "${{ vars.DEV_AKS_CLUSTER_NAME }}" --attach-acr "${{ vars.NONPROD_ACR_NAME }}"

      - name: Set dev AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.DEV_AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.DEV_AKS_CLUSTER_NAME }}

      - name: Render dev manifest templates
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          REGISTRY_HOST: ${{ vars.NONPROD_REGISTRY_HOST }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INGRESS_HOST: ${{ vars.DEV_INGRESS_HOST }}
          USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.DEV_USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID }}
          KEY_VAULT_NAME: ${{ vars.DEV_KEY_VAULT_NAME }}
          AKV_TLS_CERT_SECRET_NAME: ${{ vars.DEV_AKV_TLS_CERT_SECRET_NAME }}
          AKV_TLS_KEY_SECRET_NAME: ${{ vars.DEV_AKV_TLS_KEY_SECRET_NAME }}
        run: |
          rm -rf rendered-k8s-dev
          cp -R k8s rendered-k8s-dev
          python - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "${AZURE_TENANT_ID}": os.environ["AZURE_TENANT_ID"],
              "${REGISTRY_HOST}": os.environ["REGISTRY_HOST"],
              "${IMAGE_NAME}": os.environ["IMAGE_NAME"],
              "${INGRESS_HOST}": os.environ["INGRESS_HOST"],
              "${USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID}": os.environ["USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID"],
              "${KEY_VAULT_NAME}": os.environ["KEY_VAULT_NAME"],
              "${AKV_TLS_CERT_SECRET_NAME}": os.environ["AKV_TLS_CERT_SECRET_NAME"],
              "${AKV_TLS_KEY_SECRET_NAME}": os.environ["AKV_TLS_KEY_SECRET_NAME"],
          }

          for path in Path("rendered-k8s-dev").rglob("*.yaml"):
              content = path.read_text()
              for old, new in replacements.items():
                  content = content.replace(old, new)
              path.write_text(content)
          PY

      - name: Deploy dev manifests and update image
        run: |
          kubectl apply -k rendered-k8s-dev
          kubectl -n "${{ vars.DEV_AKS_NAMESPACE }}" set image deployment/${{ vars.DEV_AKS_DEPLOYMENT_NAME }} \
            ${{ vars.DEV_AKS_CONTAINER_NAME }}=${{ vars.NONPROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n "${{ vars.DEV_AKS_NAMESPACE }}" rollout status deployment/${{ vars.DEV_AKS_DEPLOYMENT_NAME }}

      - name: Post-deployment validation (dev cluster resources)
        run: |
          kubectl -n "${{ vars.DEV_AKS_NAMESPACE }}" get deployment/${{ vars.DEV_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.DEV_AKS_NAMESPACE }}" get pods -l app=${{ vars.DEV_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.DEV_AKS_NAMESPACE }}" get svc,ingress

      - name: Post-deployment validation (dev HTTP health)
        if: ${{ vars.DEV_AKS_VALIDATION_URL != '' }}
        run: |
          curl --fail --show-error --silent "${{ vars.DEV_AKS_VALIDATION_URL }}"

  deploy-test:
    needs: deploy-dev
    runs-on:
      - self-hosted
      - linux
    environment: ${{ vars.TEST_DEPLOYMENT_ENVIRONMENT }}

    steps:
      - name: Azure login (OIDC federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure test AKS is attached to non-production ACR
        run: az aks update --resource-group "${{ vars.TEST_AKS_RESOURCE_GROUP }}" --name "${{ vars.TEST_AKS_CLUSTER_NAME }}" --attach-acr "${{ vars.NONPROD_ACR_NAME }}"

      - name: Set test AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.TEST_AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.TEST_AKS_CLUSTER_NAME }}

      - name: Render test manifest templates
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          REGISTRY_HOST: ${{ vars.NONPROD_REGISTRY_HOST }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INGRESS_HOST: ${{ vars.TEST_INGRESS_HOST }}
          USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.TEST_USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID }}
          KEY_VAULT_NAME: ${{ vars.TEST_KEY_VAULT_NAME }}
          AKV_TLS_CERT_SECRET_NAME: ${{ vars.TEST_AKV_TLS_CERT_SECRET_NAME }}
          AKV_TLS_KEY_SECRET_NAME: ${{ vars.TEST_AKV_TLS_KEY_SECRET_NAME }}
        run: |
          rm -rf rendered-k8s-test
          cp -R k8s rendered-k8s-test
          python - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "${AZURE_TENANT_ID}": os.environ["AZURE_TENANT_ID"],
              "${REGISTRY_HOST}": os.environ["REGISTRY_HOST"],
              "${IMAGE_NAME}": os.environ["IMAGE_NAME"],
              "${INGRESS_HOST}": os.environ["INGRESS_HOST"],
              "${USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID}": os.environ["USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID"],
              "${KEY_VAULT_NAME}": os.environ["KEY_VAULT_NAME"],
              "${AKV_TLS_CERT_SECRET_NAME}": os.environ["AKV_TLS_CERT_SECRET_NAME"],
              "${AKV_TLS_KEY_SECRET_NAME}": os.environ["AKV_TLS_KEY_SECRET_NAME"],
          }

          for path in Path("rendered-k8s-test").rglob("*.yaml"):
              content = path.read_text()
              for old, new in replacements.items():
                  content = content.replace(old, new)
              path.write_text(content)
          PY

      - name: Deploy test manifests and update image
        run: |
          kubectl apply -k rendered-k8s-test
          kubectl -n "${{ vars.TEST_AKS_NAMESPACE }}" set image deployment/${{ vars.TEST_AKS_DEPLOYMENT_NAME }} \
            ${{ vars.TEST_AKS_CONTAINER_NAME }}=${{ vars.NONPROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n "${{ vars.TEST_AKS_NAMESPACE }}" rollout status deployment/${{ vars.TEST_AKS_DEPLOYMENT_NAME }}

      - name: Post-deployment validation (test cluster resources)
        run: |
          kubectl -n "${{ vars.TEST_AKS_NAMESPACE }}" get deployment/${{ vars.TEST_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.TEST_AKS_NAMESPACE }}" get pods -l app=${{ vars.TEST_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.TEST_AKS_NAMESPACE }}" get svc,ingress

      - name: Post-deployment validation (test HTTP health)
        if: ${{ vars.TEST_AKS_VALIDATION_URL != '' }}
        run: |
          curl --fail --show-error --silent "${{ vars.TEST_AKS_VALIDATION_URL }}"

  approval-prod:
    needs: deploy-test
    runs-on:
      - self-hosted
      - linux
    environment: ${{ vars.PROD_DEPLOYMENT_ENVIRONMENT }}

    steps:
      - name: Await production environment approval
        run: echo "Deployment approved for environment: ${{ vars.PROD_DEPLOYMENT_ENVIRONMENT }}"

  deploy-prod:
    needs: [deploy-test, approval-prod]
    runs-on:
      - self-hosted
      - linux
    environment: ${{ vars.PROD_DEPLOYMENT_ENVIRONMENT }}

    steps:
      - name: Azure login (OIDC federated identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Promote the exact CI-built image from non-production ACR to production ACR.
      - name: Promote image from non-production ACR to production ACR
        run: |
          az acr import \
            --name "${{ vars.PROD_ACR_NAME }}" \
            --source "${{ vars.NONPROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}" \
            --image "${{ vars.IMAGE_NAME }}:${{ github.sha }}" \
            --force

      - name: Ensure prod AKS is attached to production ACR
        run: az aks update --resource-group "${{ vars.PROD_AKS_RESOURCE_GROUP }}" --name "${{ vars.PROD_AKS_CLUSTER_NAME }}" --attach-acr "${{ vars.PROD_ACR_NAME }}"

      - name: Set prod AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.PROD_AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.PROD_AKS_CLUSTER_NAME }}

      - name: Render prod manifest templates
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          REGISTRY_HOST: ${{ vars.PROD_REGISTRY_HOST }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INGRESS_HOST: ${{ vars.PROD_INGRESS_HOST }}
          USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.PROD_USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID }}
          KEY_VAULT_NAME: ${{ vars.PROD_KEY_VAULT_NAME }}
          AKV_TLS_CERT_SECRET_NAME: ${{ vars.PROD_AKV_TLS_CERT_SECRET_NAME }}
          AKV_TLS_KEY_SECRET_NAME: ${{ vars.PROD_AKV_TLS_KEY_SECRET_NAME }}
        run: |
          rm -rf rendered-k8s-prod
          cp -R k8s rendered-k8s-prod
          python - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "${AZURE_TENANT_ID}": os.environ["AZURE_TENANT_ID"],
              "${REGISTRY_HOST}": os.environ["REGISTRY_HOST"],
              "${IMAGE_NAME}": os.environ["IMAGE_NAME"],
              "${INGRESS_HOST}": os.environ["INGRESS_HOST"],
              "${USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID}": os.environ["USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID"],
              "${KEY_VAULT_NAME}": os.environ["KEY_VAULT_NAME"],
              "${AKV_TLS_CERT_SECRET_NAME}": os.environ["AKV_TLS_CERT_SECRET_NAME"],
              "${AKV_TLS_KEY_SECRET_NAME}": os.environ["AKV_TLS_KEY_SECRET_NAME"],
          }

          for path in Path("rendered-k8s-prod").rglob("*.yaml"):
              content = path.read_text()
              for old, new in replacements.items():
                  content = content.replace(old, new)
              path.write_text(content)
          PY

      - name: Deploy prod manifests and update image
        run: |
          kubectl apply -k rendered-k8s-prod
          kubectl -n "${{ vars.PROD_AKS_NAMESPACE }}" set image deployment/${{ vars.PROD_AKS_DEPLOYMENT_NAME }} \
            ${{ vars.PROD_AKS_CONTAINER_NAME }}=${{ vars.PROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n "${{ vars.PROD_AKS_NAMESPACE }}" rollout status deployment/${{ vars.PROD_AKS_DEPLOYMENT_NAME }}

      - name: Post-deployment validation (prod cluster resources)
        run: |
          kubectl -n "${{ vars.PROD_AKS_NAMESPACE }}" get deployment/${{ vars.PROD_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.PROD_AKS_NAMESPACE }}" get pods -l app=${{ vars.PROD_AKS_DEPLOYMENT_NAME }}
          kubectl -n "${{ vars.PROD_AKS_NAMESPACE }}" get svc,ingress

      - name: Post-deployment validation (prod HTTP health)
        if: ${{ vars.PROD_AKS_VALIDATION_URL != '' }}
        run: |
          curl --fail --show-error --silent "${{ vars.PROD_AKS_VALIDATION_URL }}"
