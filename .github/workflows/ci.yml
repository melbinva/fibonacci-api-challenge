name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run unit tests
        run: uv run pytest -q tests/

  what-if-manifests:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render Kubernetes manifests (what-if)
        run: |
          docker run --rm -v "$PWD:/work" -w /work bitnami/kubectl:1.30.3 \
            kustomize k8s > rendered-manifests.yaml

      - name: Validate manifests with client-side dry-run
        run: |
          docker run --rm -v "$PWD:/work" -w /work bitnami/kubectl:1.30.3 \
            apply --dry-run=client --validate=false -f rendered-manifests.yaml

  docker-build:
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fibonacci-api:ci .

  push-to-acr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, what-if-manifests, docker-build]
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.NONPROD_ACR_NAME }}"

      - name: Build and push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.NONPROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:latest
            ${{ vars.NONPROD_REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
