apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fibonacci-api
  namespace: fibonacci-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  tls:
    - hosts:
        - ${INGRESS_HOST}
      secretName: fibonacci-api-tls
  rules:
    - host: ${INGRESS_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fibonacci-api
                port:
                  number: 80
