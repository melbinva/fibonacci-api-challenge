apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fibonacci-api-akv-tls
  namespace: fibonacci-prod
spec:
  provider: azure
  secretObjects:
    - secretName: fibonacci-api-tls
      type: kubernetes.io/tls
      data:
        - objectName: tls.crt
          key: tls.crt
        - objectName: tls.key
          key: tls.key
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: "${AKV_TLS_CERT_SECRET_NAME}"
          objectAlias: "tls.crt"
          objectType: secret
        - |
          objectName: "${AKV_TLS_KEY_SECRET_NAME}"
          objectAlias: "tls.key"
          objectType: secret
