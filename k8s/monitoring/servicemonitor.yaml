apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fibonacci-api
  namespace: fibonacci-prod
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: fibonacci-api
  namespaceSelector:
    matchNames:
      - fibonacci-prod
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      path: /health
